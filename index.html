<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader - Vortex</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #0f0f1b;
            padding: 20px;
            color: white;
            text-align: center;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #1e1e2e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        input {
            width: 80%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            margin: 10px 0;
            font-size: 16px;
            text-align: center;
        }
        button {
            background: #ff004f;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        .loading {
            margin-top: 20px;
            font-size: 14px;
            color: #ffaa44;
        }
        .result {
            margin-top: 25px;
            background: #2a2a3a;
            padding: 15px;
            border-radius: 15px;
        }
        video {
            width: 100%;
            max-height: 450px;
            border-radius: 15px;
            margin-top: 10px;
        }
        .btn {
            display: inline-block;
            background: #00b894;
            color: white;
            padding: 10px 18px;
            margin: 10px 5px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-audio {
            background: #e17055;
        }
        .error {
            color: #ff8888;
            background: #330000;
            padding: 12px;
            border-radius: 15px;
        }
        footer {
            font-size: 11px;
            margin-top: 25px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎬 Vortex TikTok Downloader</h1>
    <p>Download video & audio tanpa watermark</p>
    <input type="text" id="urlInput" placeholder="Paste URL TikTok disini...">
    <br>
    <button onclick="downloadTikTok()">📥 Download Sekarang</button>
    <div id="loading" class="loading" style="display:none;">⏳ Lagi ambil data, sabar ya...</div>
    <div id="result"></div>
    <footer>Powered by TikWM API | No watermark</footer>
</div>

<script>
async function downloadTikTok() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) {
        alert("Masukkan URL TikTok dulu bro!");
        return;
    }
    
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').innerHTML = '';
    
    try {
        // Pake CORS proxy biar aman di browser
        const proxy = "https://api.allorigins.win/raw?url=";
        const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`;
        
        const res = await fetch(proxy + encodeURIComponent(apiUrl));
        const json = await res.json();
        
        if (json.code !== 0 || !json.data) {
            throw new Error("Gagal dapet data. Cek URL nya.");
        }
        
        const data = json.data;
        const videoUrl = "https://www.tikwm.com" + (data.hdplay || data.play);
        const audioUrl = "https://www.tikwm.com" + data.music;
        const title = data.title || "TikTok Video";
        const likes = data.digg_count || 0;
        const shares = data.share_count || 0;
        
        let html = `
            <div class="result">
                <strong>${title.substring(0, 70)}</strong><br>
                <video src="${videoUrl}" controls autoplay loop></video><br>
                <a class="btn" href="${videoUrl}" download>⬇️ Download Video (No WM)</a>
                <a class="btn btn-audio" href="${audioUrl}" download>🎵 Download Audio (MP3)</a>
                <p>❤️ ${formatNumber(likes)} | 🔁 ${formatNumber(shares)}</p>
            </div>
        `;
        document.getElementById('result').innerHTML = html;
    } catch (err) {
        document.getElementById('result').innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function formatNumber(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}
</script>
</body>
</html>
