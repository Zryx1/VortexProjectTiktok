<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vortex TikTok Downloader | Video & MP3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container utama */
        .app-container {
            max-width: 580px;
            width: 100%;
            margin: 0 auto;
        }

        /* Card tanpa border, pure glassmorphism */
        .glass-card {
            background: linear-gradient(145deg, #0f0f1a 0%, #0a0a12 100%);
            backdrop-filter: blur(0px);
            border-radius: 48px;
            padding: 28px 24px 38px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.8), 0 0 0 0px rgba(156, 39, 176, 0);
            transition: box-shadow 0.3s ease, transform 0.2s ease;
        }

        .glass-card:hover {
            box-shadow: 0 30px 55px -15px rgba(156, 39, 176, 0.3);
        }

        /* Header dengan efek neon */
        .neon-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .neon-header h1 {
            font-size: 2.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 8px rgba(168, 85, 247, 0.4);
            animation: shimmer 3s ease infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sub {
            text-align: center;
            color: #a1a1b9;
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        /* Mode selector glowing */
        .mode-selector {
            display: flex;
            gap: 14px;
            background: #0c0c14;
            padding: 8px;
            border-radius: 80px;
            margin-bottom: 28px;
        }

        .mode-btn {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            color: #b1b1d1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn.active {
            background: linear-gradient(95deg, #7c3aed, #a855f7);
            color: white;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
            transform: scale(1.02);
        }

        .mode-btn:active {
            transform: scale(0.97);
        }

        /* Input group glow effect */
        .input-group {
            background: #0c0c16;
            border-radius: 60px;
            display: flex;
            overflow: hidden;
            margin-bottom: 24px;
            transition: all 0.2s;
            box-shadow: 0 0 0 0px rgba(139, 92, 246, 0);
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.5);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 22px;
            color: #f0f0ff;
            font-size: 0.9rem;
            outline: none;
            font-weight: 500;
        }

        input::placeholder {
            color: #55557a;
            font-weight: 400;
        }

        /* Tombol utama dengan efek glow */
        .glow-btn {
            width: 100%;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.3);
            margin-bottom: 22px;
        }

        .glow-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.5);
        }

        /* Loading animation */
        .loading {
            text-align: center;
            background: #0f0f1c;
            border-radius: 40px;
            padding: 16px;
            margin-top: 15px;
            color: #c084fc;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        /* Result box - tanpa border, transparan */
        .result-box {
            margin-top: 24px;
            background: #0b0b14;
            border-radius: 36px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        /* Video player styling */
        .result-box video {
            width: 100%;
            max-height: 500px;
            border-radius: 28px;
            background: #000000;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            outline: none;
            margin-bottom: 18px;
        }

        /* Info author & stats warna putih */
        .video-info {
            margin: 12px 0 18px 0;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.4;
            margin-bottom: 12px;
            letter-spacing: -0.2px;
        }

        .author-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }

        .author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: #2a2a3c;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .author-name {
            font-weight: 600;
            color: #e0e0ff;
            font-size: 0.85rem;
        }

        .stats {
            display: flex;
            gap: 18px;
            color: #c4c4e6;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Tombol download dual */
        .download-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn-download {
            flex: 1;
            background: #1e1e30;
            text-align: center;
            padding: 14px 10px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download.video-btn {
            background: linear-gradient(95deg, #7c3aed, #9b4dff);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .btn-download.audio-btn {
            background: linear-gradient(95deg, #4c1d95, #7c3aed);
            box-shadow: 0 4px 12px rgba(108, 43, 217, 0.3);
        }

        .btn-download:active {
            transform: scale(0.97);
        }

        .error {
            background: rgba(255, 45, 85, 0.12);
            color: #ffa7b5;
            padding: 18px;
            border-radius: 32px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 28px;
            color: #5a5b89;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="glass-card">
        <div class="neon-header">
            <h1>⚡ VORTEX TIKTOK</h1>
            <div class="sub">Downloader tanpa watermark • Video HD & MP3</div>
        </div>

        <!-- Mode selector -->
        <div class="mode-selector" id="modeSelector">
            <div class="mode-btn active" data-mode="video">
                🎥 Video (No WM)
            </div>
            <div class="mode-btn" data-mode="audio">
                🎵 MP3 (Audio Only)
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="tiktokUrl" placeholder="Tempel URL TikTok disini... contoh: https://vt.tiktok.com/xxxx">
        </div>

        <button class="glow-btn" id="actionBtn">✨ Proses & Download</button>

        <div id="loadingArea" style="display: none;">
            <div class="loading">⏳ Sedang memproses, tunggu sebentar...</div>
        </div>

        <div id="resultArea"></div>
        <footer>Powered by Vortex Proxy • Multi-API Fallback • Glowing UI</footer>
    </div>
</div>

<script>
    // Mode video / audio
    let currentMode = "video";
    
    const modeBtns = document.querySelectorAll(".mode-btn");
    const urlInput = document.getElementById("tiktokUrl");
    const actionBtn = document.getElementById("actionBtn");
    const loadingDiv = document.getElementById("loadingArea");
    const resultDiv = document.getElementById("resultArea");
    
    modeBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            modeBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentMode = btn.getAttribute("data-mode");
            if(currentMode === "audio") {
                actionBtn.innerHTML = "🎵 Konversi ke MP3 & Download";
            } else {
                actionBtn.innerHTML = "🎥 Download Video Tanpa Watermark";
            }
            resultDiv.innerHTML = "";
        });
    });
    
    actionBtn.addEventListener("click", async () => {
        const url = urlInput.value.trim();
        if (!url) {
            alert("⚠️ Masukkan URL TikTok dulu!");
            return;
        }
        
        loadingDiv.style.display = "block";
        resultDiv.innerHTML = "";
        
        try {
            const response = await fetch("/api/download", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: url, mode: currentMode })
            });
            
            const data = await response.json();
            
            if (!data.success || !data.download_url) {
                throw new Error(data.message || "Gagal mengambil data dari server");
            }
            
            if (currentMode === "video") {
                showVideoResult(data);
            } else {
                showAudioResult(data);
            }
        } catch (err) {
            resultDiv.innerHTML = `<div class="error">❌ Gagal: ${err.message}<br><br>💡 Coba URL lain atau cek koneksi</div>`;
        } finally {
            loadingDiv.style.display = "none";
        }
    });
    
    function showVideoResult(data) {
        const videoUrl = data.download_url;
        const title = data.title || "TikTok Video";
        const author = data.author || "TikTok User";
        const avatar = data.thumbnail || "https://ui-avatars.com/api/?background=7c3aed&color=fff&name=" + encodeURIComponent(author);
        const likes = data.stats?.likes || "❤️ ?";
        const comments = data.stats?.comments || "💬 ?";
        
        let html = `
            <div class="result-box">
                <video src="${videoUrl}" controls autoplay loop playsinline poster="${data.thumbnail || ""}"></video>
                <div class="video-info">
                    <div class="video-title">✨ ${escapeHtml(title.substring(0, 80))}</div>
                    <div class="author-stats">
                        <div class="author">
                            <img class="author-avatar" src="${avatar}" onerror="this.src='https://ui-avatars.com/api/?background=7c3aed&color=fff&name=?'">
                            <span class="author-name">@${escapeHtml(author)}</span>
                        </div>
                        <div class="stats">
                            <span>❤️ ${likes}</span>
                            <span>💬 ${comments}</span>
                        </div>
                    </div>
                    <div class="download-actions">
                        <a class="btn-download video-btn" href="${videoUrl}" download>⬇️ Download Video (MP4)</a>
                    </div>
                </div>
            </div>
        `;
        resultDiv.innerHTML = html;
    }
    
    function showAudioResult(data) {
        const audioUrl = data.download_url;
        const title = data.title || "TikTok Audio";
        const author = data.author || "TikTok Creator";
        
        let html = `
            <div class="result-box">
                <div style="text-align: center; padding: 16px 0 8px;">
                    <div style="font-size: 3rem;">🎧</div>
                    <div class="video-title" style="margin-top: 12px;">${escapeHtml(title.substring(0, 70))}</div>
                    <div style="color: #b9b9e6; margin: 8px 0 12px;">🎤 @${escapeHtml(author)}</div>
                    <audio controls style="width: 100%; margin: 12px 0 10px;" src="${audioUrl}"></audio>
                </div>
                <div class="download-actions">
                    <a class="btn-download audio-btn" href="${audioUrl}" download>🎵 Download MP3 (Audio Only)</a>
                </div>
            </div>
        `;
        resultDiv.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
